name: Conformance (E2E)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "examples/**"
      - "spec/**"
      - ".github/workflows/conformance.yml"

env:
  TURBO_TELEMETRY_DISABLED: 1
  CI: true

jobs:
  astro-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bunx turbo run build --filter='@dualmark/*'
      - name: Build astro-blog example
        run: bun run --filter dualmark-example-astro-blog build
      - name: Verify astro-blog under astro dev
        working-directory: examples/astro-blog
        run: |
          ./node_modules/.bin/astro dev --port 4321 &
          DEV_PID=$!
          sleep 10
          node ../../packages/cli/dist/cli.js verify http://localhost:4321/blog/hello-world
          kill $DEV_PID

  astro-cloudflare-full:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bunx turbo run build --filter='@dualmark/*'
      - name: Build astro-cloudflare-full
        run: bun run --filter dualmark-example-astro-cloudflare-full build
      - name: Verify under wrangler dev (full negotiation)
        working-directory: examples/astro-cloudflare-full
        run: |
          ./node_modules/.bin/wrangler dev --port 8787 --local --no-bundle=false &
          WRANGLER_PID=$!
          sleep 15
          node ../../packages/cli/dist/cli.js verify http://localhost:8787/blog/edge-aeo
          kill $WRANGLER_PID

  nextjs-app-router:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bunx turbo run build --filter='@dualmark/*'
      - name: Run nextjs-app-router under next dev
        working-directory: examples/nextjs-app-router
        run: |
          ./node_modules/.bin/next dev --port 3000 &
          NEXT_PID=$!
          sleep 15
          node ../../packages/cli/dist/cli.js verify http://localhost:3000/posts/hello
          kill $NEXT_PID

  dualmark-docs-dogfood:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bunx turbo run build --filter='@dualmark/*'
      - name: Build dualmark-docs (the website itself)
        run: bun run --filter dualmark-docs build
      - name: Start dualmark-docs and verify against the AEO Spec
        working-directory: apps/docs
        run: |
          ./node_modules/.bin/next start --port 4000 &
          DOCS_PID=$!
          sleep 8
          THRESHOLD=105
          fail=0
          for path in / /docs /docs/quickstart /docs/spec/headers /play; do
            echo "::group::verify ${path}"
            score=$(node ../../packages/cli/dist/cli.js verify "http://localhost:4000${path}" --json | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{const r=JSON.parse(d);console.log(r.score)})')
            echo "score=${score}"
            if [ "${score}" -lt "${THRESHOLD}" ]; then
              echo "::error::${path} scored ${score}/125 (below threshold ${THRESHOLD})"
              fail=1
            fi
            echo "::endgroup::"
          done
          kill $DOCS_PID
          exit $fail
