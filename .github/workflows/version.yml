name: Version (PR bot)

# Opens / updates a "chore: version packages" PR whenever changesets are
# present on main. Does NOT publish to npm — that happens in release.yml,
# triggered explicitly by a GitHub Release.

on:
  push:
    branches: [main]

concurrency:
  group: version-${{ github.ref }}
  cancel-in-progress: false

env:
  TURBO_TELEMETRY_DISABLED: 1
  CI: true

jobs:
  version:
    if: github.repository == 'dodopayments/dualmark'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Open / update Version Packages PR
        uses: changesets/action@v1
        with:
          # No `publish:` argument — this job ONLY versions, never releases.
          version: bun run version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
