name: Release (npm publish)

# Publishes @dualmark/* to npm. Triggered ONLY by:
#   1. A GitHub Release being published (recommended path: draft a release
#      from the GitHub UI on the Releases page after merging the
#      "chore: version packages" PR), OR
#   2. Manual workflow_dispatch (escape hatch for re-publishing a tag).
#
# Never runs on a plain push, so a stray commit on main can never publish.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0). Required for manual runs."
        required: true
        type: string

concurrency:
  group: release-publish
  cancel-in-progress: false

env:
  TURBO_TELEMETRY_DISABLED: 1
  CI: true

jobs:
  publish:
    if: github.repository == 'dodopayments/dualmark'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout (tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          registry-url: https://registry.npmjs.org

      # Refresh bun.lock workspace metadata so `bun pm pack` (later step)
      # rewrites `workspace:*` deps in the tarball to the tag's actual
      # versions. `bun install --frozen-lockfile` (in setup) does NOT update
      # workspace version metadata even when packages/*/package.json drifts
      # from bun.lock. See oven-sh/bun#20477 (open as of bun 1.3.5).
      - name: Refresh lockfile workspace metadata
        run: bun install --lockfile-only

      - name: Build packages
        run: bunx turbo run build --filter='./packages/*'

      - name: Run tests (gate release)
        run: bunx turbo run test --filter='./packages/*'

      - name: Typecheck (gate release)
        run: bunx turbo run typecheck --filter='./packages/*'

      - name: Verify tag matches package versions
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          # Strip leading 'v' for comparison
          TAG_VERSION="${TAG#v}"
          echo "Release tag: $TAG (normalized: $TAG_VERSION)"
          # Check that at least one package matches the tag version (linked changesets keep them in sync)
          MATCH=0
          for pkg in packages/*/package.json; do
            PKG_VERSION=$(node -p "require('./$pkg').version")
            PKG_NAME=$(node -p "require('./$pkg').name")
            echo "  $PKG_NAME = $PKG_VERSION"
            if [ "$PKG_VERSION" = "$TAG_VERSION" ]; then
              MATCH=1
            fi
          done
          if [ "$MATCH" -eq 0 ]; then
            echo "::error::No package version matches release tag $TAG_VERSION. Did you forget to merge the 'chore: version packages' PR before drafting the release?"
            exit 1
          fi

      - name: Publish to npm (with provenance)
        # Two-step pack-then-publish flow:
        #
        #   1. `bun pm pack` rewrites `workspace:*` deps to concrete versions
        #      at pack time. `npm publish` alone CANNOT do this — it would
        #      ship invalid `"workspace:*"` strings to the registry.
        #   2. `npm publish <tarball> --provenance` uploads the pre-packed
        #      tarball and generates a Sigstore-backed npm provenance
        #      attestation (visible as a "Provenance" badge on npmjs.com).
        #
        # Why not `bun publish --provenance`?
        #   As of bun 1.3.5, `bun publish` does NOT support the --provenance
        #   flag. See oven-sh/bun#15601 / #21586. When that lands in a stable
        #   bun release, this whole block can collapse back to
        #   `bun publish --access public --provenance --tag latest`.
        #
        # Why `--provenance` requires `id-token: write`:
        #   npm provenance uses OIDC to mint a short-lived Sigstore cert from
        #   the GitHub Actions runner's identity, so the published attestation
        #   is cryptographically tied to this exact workflow file + commit SHA.
        #   Permission is granted at the job level above.
        #
        # Auth: `actions/setup-node` (in our setup composite action) writes
        # ~/.npmrc to read $NODE_AUTH_TOKEN, which is what `npm publish` uses.
        run: |
          set -euo pipefail
          published_count=0
          for pkg_dir in packages/*; do
            if [ ! -f "$pkg_dir/package.json" ]; then continue; fi
            pkg_name=$(node -p "require('./$pkg_dir/package.json').name")
            pkg_version=$(node -p "require('./$pkg_dir/package.json').version")
            published=$(npm view "$pkg_name@$pkg_version" version --silent 2>/dev/null || true)
            if [ -n "$published" ]; then
              echo "::group::$pkg_name@$pkg_version (skip — already on npm)"
              echo "  registry reports version: $published"
              echo "::endgroup::"
              continue
            fi
            echo "::group::Packing $pkg_name@$pkg_version"
            # `bun pm pack --quiet` prints the tarball filename, but bun 1.3.5
            # wraps it in stray whitespace — a leading \n on Linux runners
            # produces an unsplit `\n<filename>\n` blob that command
            # substitution turns into a path with a literal newline in the
            # middle, which `npm publish` then can't open (ENOENT).
            # `tr -d '[:space:]'` strips all whitespace defensively so the
            # variable holds only the filename, regardless of bun version.
            # The tarball is written to the package dir.
            tarball=$(cd "$pkg_dir" && bun pm pack --quiet | tr -d '[:space:]')
            tarball_abs="$(cd "$pkg_dir" && readlink -f "$tarball")"
            if [ ! -f "$tarball_abs" ]; then
              echo "::error::bun pm pack produced no tarball at expected path: $tarball_abs"
              exit 1
            fi
            echo "  tarball: $tarball_abs"
            echo "::endgroup::"
            echo "::group::Publishing $pkg_name@$pkg_version (with provenance)"
            npm publish "$tarball_abs" --access public --tag latest --provenance
            echo "::endgroup::"
            published_count=$((published_count + 1))
          done
          echo ""
          echo "Published $published_count package(s) to npm with provenance attestation."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
