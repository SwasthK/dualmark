name: Release (npm publish)

# Publishes @dualmark/* to npm. Triggered ONLY by:
#   1. A GitHub Release being published (recommended path: draft a release
#      from the GitHub UI on the Releases page after merging the
#      "chore: version packages" PR), OR
#   2. Manual workflow_dispatch (escape hatch for re-publishing a tag).
#
# Never runs on a plain push, so a stray commit on main can never publish.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0). Required for manual runs."
        required: true
        type: string

concurrency:
  group: release-publish
  cancel-in-progress: false

env:
  TURBO_TELEMETRY_DISABLED: 1
  CI: true

jobs:
  publish:
    if: github.repository == 'dodopayments/dualmark'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout (tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          registry-url: https://registry.npmjs.org

      # Refresh bun.lock workspace metadata so `bun publish` rewrites
      # `workspace:*` deps to the tag's actual versions. `bun install
      # --frozen-lockfile` (in setup) does NOT update workspace version
      # metadata even when packages/*/package.json drifts from bun.lock.
      # See oven-sh/bun#20477 (open as of bun 1.3.5).
      - name: Refresh lockfile workspace metadata
        run: bun install --lockfile-only

      - name: Build packages
        run: bunx turbo run build --filter='./packages/*'

      - name: Run tests (gate release)
        run: bunx turbo run test --filter='./packages/*'

      - name: Typecheck (gate release)
        run: bunx turbo run typecheck --filter='./packages/*'

      - name: Verify tag matches package versions
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          # Strip leading 'v' for comparison
          TAG_VERSION="${TAG#v}"
          echo "Release tag: $TAG (normalized: $TAG_VERSION)"
          # Check that at least one package matches the tag version (linked changesets keep them in sync)
          MATCH=0
          for pkg in packages/*/package.json; do
            PKG_VERSION=$(node -p "require('./$pkg').version")
            PKG_NAME=$(node -p "require('./$pkg').name")
            echo "  $PKG_NAME = $PKG_VERSION"
            if [ "$PKG_VERSION" = "$TAG_VERSION" ]; then
              MATCH=1
            fi
          done
          if [ "$MATCH" -eq 0 ]; then
            echo "::error::No package version matches release tag $TAG_VERSION. Did you forget to merge the 'chore: version packages' PR before drafting the release?"
            exit 1
          fi

      - name: Publish to npm
        # Uses `bun publish` per package instead of `changeset publish` because
        # changesets delegates to `npm publish` (which does NOT rewrite
        # workspace:* dependencies). bun publish DOES rewrite workspace:* to
        # the actual version at pack time, producing valid tarballs that
        # external consumers can install.
        #
        # Auth: bun publish reads NPM_CONFIG_TOKEN env var (since bun 1.1.33).
        # This is the only reliable auth method for bun publish in CI —
        # writing ~/.npmrc does NOT work because bun looks at NPM_CONFIG_USERCONFIG
        # path, not ~/.npmrc by default.
        #
        # Provenance disabled because the repo is INTERNAL — flip repo public
        # + add `--provenance` here to re-enable.
        run: |
          set -euo pipefail
          published_count=0
          for pkg_dir in packages/*; do
            if [ ! -f "$pkg_dir/package.json" ]; then continue; fi
            pkg_name=$(node -p "require('./$pkg_dir/package.json').name")
            pkg_version=$(node -p "require('./$pkg_dir/package.json').version")
            published=$(npm view "$pkg_name@$pkg_version" version --silent 2>/dev/null || true)
            if [ -n "$published" ]; then
              echo "::group::$pkg_name@$pkg_version (skip — already on npm)"
              echo "  registry reports version: $published"
              echo "::endgroup::"
              continue
            fi
            echo "::group::Publishing $pkg_name@$pkg_version"
            (cd "$pkg_dir" && bun publish --access public --tag latest)
            echo "::endgroup::"
            published_count=$((published_count + 1))
          done
          echo ""
          echo "Published $published_count package(s) to npm at version matching tag."
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
