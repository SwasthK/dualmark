name: Setup bun + Node + install
description: Install bun 1.3.5 and Node 22 with bun-cached dependencies for the Dualmark monorepo.

inputs:
  install:
    description: Whether to run `bun install --frozen-lockfile`
    required: false
    default: "true"
  registry-url:
    description: Optional npm registry URL (set for publish workflows)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.5

    - uses: actions/setup-node@v4
      with:
        node-version: 22
        registry-url: ${{ inputs.registry-url }}

    - if: inputs.install == 'true'
      shell: bash
      run: bun install --frozen-lockfile
